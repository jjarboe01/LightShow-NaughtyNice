# ── www → bare domain redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name www.jarboefamilylights.com;
    return 301 https://jarboefamilylights.com$request_uri;
}

# ── Ghost — Jarboe Family Lights main site ─────────────────────────────────
server {
    listen 80;
    server_name jarboefamilylights.com;

    # Ghost requires these headers to generate correct URLs behind Cloudflare
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    location / {
        proxy_pass         http://ghost:2368;
        client_max_body_size 50m;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# ── NaughtyNiceList — Santa's List submission form ─────────────────────────
server {
    listen 80;
    server_name santaslist.jarboefamilylights.com;

    # Static assets served directly by nginx
    location /static/ {
        alias /app/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # All other requests proxy to gunicorn
    location / {
        proxy_pass         http://naughtynicelist:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # Allow multipart photo uploads up to 6 MB
        client_max_body_size 6m;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
