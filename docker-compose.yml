version: "3.9"

services:
  web:
    build: .
    container_name: lightshow-web
    restart: unless-stopped
    environment:
      - FPP_HOST=${FPP_HOST}
      - FPP_PORT=${FPP_PORT:-80}
      - FPP_PHOTO_MODEL=${FPP_PHOTO_MODEL:-PhotoZone}
      - FPP_TICKER_MODEL=${FPP_TICKER_MODEL:-TickerZone}
      - FPP_BASE_PLAYLIST=${FPP_BASE_PLAYLIST:-breaking_news}
      - MATRIX_WIDTH=192
      - MATRIX_HEIGHT=192
      - PHOTO_ZONE_HEIGHT=140
      - TICKER_ZONE_HEIGHT=52
      - UPLOAD_MAX_BYTES=${UPLOAD_MAX_BYTES:-5242880}
      - SECRET_KEY=${SECRET_KEY:-changeme}
    volumes:
      - upload_tmp:/app/uploads
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: lightshow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro
    depends_on:
      - web

volumes:
  upload_tmp:
